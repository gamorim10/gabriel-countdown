<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabriel Signal — Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    #starfield { position: fixed; inset: 0; z-index: 0; }

    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
      );
    }

    .container {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 24px 16px;
      text-align: center;
    }

    .signal-title {
      font-family: 'Syncopate', sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 6vw, 72px);
      letter-spacing: clamp(4px, 2vw, 14px);
      color: #cc0000;
      text-transform: uppercase;
      text-shadow: 0 0 40px #ff000088, 0 0 80px #ff000033;
    }

    .divider {
      width: min(480px, 90vw); height: 1px;
      background: linear-gradient(to right, transparent, #cc0000, transparent);
    }

    .countdown-grid {
      display: flex;
      gap: clamp(8px, 2.5vw, 20px);
      align-items: flex-start;
    }

    .unit {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }

    @keyframes pulse-red {
      0%, 100% { color: #cc0000; text-shadow: 0 0 12px #ff000066; }
      50%       { color: #ff2222; text-shadow: 0 0 30px #ff0000, 0 0 60px #ff000088, 0 0 90px #ff000044; }
    }

    .digits {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(52px, 15vw, 120px);
      font-weight: bold;
      letter-spacing: -2px;
      line-height: 1;
      min-width: clamp(72px, 21vw, 168px);
      text-align: center;
      animation: pulse-red 1s ease-in-out infinite;
    }

    .unit-label {
      font-size: clamp(7px, 1.8vw, 10px);
      letter-spacing: 4px;
      color: #440000;
      text-transform: uppercase;
    }

    .sep {
      font-size: clamp(40px, 12vw, 90px);
      font-weight: bold;
      color: #330000;
      line-height: 1;
      align-self: flex-start;
      padding-top: clamp(6px, 1.5vw, 12px);
    }

    .event-info {
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(9px, 2.2vw, 13px);
      letter-spacing: 3px;
      color: #550000;
      line-height: 2;
    }

    @keyframes glitch {
      0%,89%,100%{ transform:translate(0); clip-path:none; }
      90%{ transform:translate(-3px,1px); clip-path:inset(30% 0 50% 0); }
      92%{ transform:translate(3px,-1px); clip-path:inset(60% 0 20% 0); }
      94%{ transform:translate(-2px,2px); clip-path:inset(10% 0 70% 0); }
      96%{ transform:translate(0); clip-path:none; }
    }

    .launched-msg {
      display: none;
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(24px, 8vw, 56px);
      font-weight: 700;
      letter-spacing: 6px;
      color: #ff0000;
      text-shadow: 0 0 40px #ff0000, 0 0 80px #ff000066;
      animation: glitch 2s infinite;
    }

    /* ── TICKER ── */
    .ticker-wrap {
      width: min(480px, 92vw);
      border: 1px solid #220000;
      background: #040000;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ticker-badge {
      font-size: 8px;
      letter-spacing: 3px;
      color: #660000;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-text {
      font-size: clamp(11px, 2.8vw, 13px);
      letter-spacing: 2px;
      color: #cc0000;
      text-shadow: 0 0 8px #ff000055;
      flex: 1;
      text-align: left;
      transition: opacity 0.2s;
    }

    .ticker-text.dim { opacity: 0; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="scanlines"></div>

<div class="container">

  <div class="signal-title">Gabriel Signal</div>

  <div class="divider"></div>

  <div id="countdown-wrap" class="countdown-grid">
    <div class="unit">
      <div class="digits" id="days">00</div>
      <div class="unit-label">days</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="digits" id="hours">00</div>
      <div class="unit-label">hours</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="digits" id="minutes">00</div>
      <div class="unit-label">minutes</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="digits" id="seconds">00</div>
      <div class="unit-label">seconds</div>
    </div>
  </div>

  <div class="launched-msg" id="launched">SIGNAL LAUNCHED</div>

  <div class="divider"></div>

  <div class="ticker-wrap">
    <div class="ticker-badge">// TRANSMISSION //</div>
    <div class="ticker-text" id="ticker">--</div>
  </div>

  <div class="event-info">
    MAY 1ST · 4:00 PM<br>
    AV. IBIJAU, 45
  </div>

</div>

<script>
// ── STARFIELD ──────────────────────────────────────────────────────────────
const sfCanvas = document.getElementById('starfield');
const sfCtx = sfCanvas.getContext('2d');
let stars = [];

function initStars() {
  sfCanvas.width = window.innerWidth;
  sfCanvas.height = window.innerHeight;
  stars = Array.from({ length: 180 }, () => ({
    x: Math.random() * sfCanvas.width,
    y: Math.random() * sfCanvas.height,
    r: Math.random() * 1.3 + 0.2,
    op: Math.random(),
  }));
}

function drawStars() {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  stars.forEach(s => {
    s.op += (Math.random() - 0.5) * 0.04;
    s.op = Math.max(0.05, Math.min(0.9, s.op));
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(255,${Math.floor(Math.random()*25)},${Math.floor(Math.random()*25)},${s.op})`;
    sfCtx.fill();
  });
  requestAnimationFrame(drawStars);
}

initStars();
drawStars();
window.addEventListener('resize', initStars);

// ── COUNTDOWN ──────────────────────────────────────────────────────────────
const TARGET = new Date('2025-05-01T16:00:00');
const GLYPHS = '▓░▒█▄▀■□▪▫◆◇○●◉⬡⬢';

function pad(n) { return String(n).padStart(2, '0'); }

function randGlyph() {
  return GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
}

function scramble(text) {
  return text.split('').map(c => c === ' ' ? ' ' : randGlyph()).join('');
}

function getTimeString(diff) {
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${pad(d)}D : ${pad(h)}H : ${pad(m)}M : ${pad(s)}S`;
}

function update() {
  const diff = TARGET - new Date();

  if (diff <= 0) {
    document.getElementById('countdown-wrap').style.display = 'none';
    document.getElementById('launched').style.display = 'block';
    return;
  }

  document.getElementById('days').textContent    = pad(Math.floor(diff / 86400000));
  document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
  document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
  document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
}

// ── TICKER ─────────────────────────────────────────────────────────────────
const tickerEl = document.getElementById('ticker');
let showingCode = true;
let scrambleInterval = null;

function setTicker(text, fade) {
  if (fade) {
    tickerEl.classList.add('dim');
    setTimeout(() => {
      tickerEl.textContent = text;
      tickerEl.classList.remove('dim');
    }, 220);
  } else {
    tickerEl.textContent = text;
  }
}

function startScramble(target) {
  let ticks = 0;
  const max = 14;
  clearInterval(scrambleInterval);
  scrambleInterval = setInterval(() => {
    ticks++;
    if (ticks >= max) {
      clearInterval(scrambleInterval);
      setTicker(target, false);
    } else {
      tickerEl.textContent = scramble(target);
    }
  }, 60);
}

function cycleTicker() {
  const diff = TARGET - new Date();
  if (diff <= 0) {
    setTicker('SIGNAL LAUNCHED', true);
    return;
  }

  showingCode = !showingCode;

  if (showingCode) {
    const codeStr = getTimeString(diff);
    tickerEl.classList.add('dim');
    setTimeout(() => {
      tickerEl.classList.remove('dim');
      startScramble(codeStr);
    }, 220);
  } else {
    const timeStr = getTimeString(diff);
    tickerEl.classList.add('dim');
    setTimeout(() => {
      tickerEl.classList.remove('dim');
      startScramble(timeStr);
    }, 220);
  }
}

update();
setInterval(update, 500);

// Init ticker immediately with scramble into time
setTimeout(() => startScramble(getTimeString(TARGET - new Date())), 600);
setInterval(cycleTicker, 2800);
</script>
</body>
</html>
